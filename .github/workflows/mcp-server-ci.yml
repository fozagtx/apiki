name: MCP Server CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/mcp-server/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/mcp-server/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/mcp-server/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build
